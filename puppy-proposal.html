<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐾 An Important Question</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #ff85a1;
      --pink-light: #ffc2d1;
      --pink-pale: #fff0f4;
      --cream: #fff8f0;
      --brown: #7c4f3a;
      --brown-light: #c8856a;
      --yellow: #ffe066;
      --purple: #d4a8ff;
      --green: #a8f0c6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: var(--pink-pale);
      overflow-x: hidden;
    }

    /* ===== FLOATING PAWS BACKGROUND ===== */
    .bg-paws {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-paws span {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.12;
      animation: floatPaw linear infinite;
    }

    @keyframes floatPaw {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.08; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0.14; }
    }

    /* ===== PAGE 1 ===== */
    #page1 {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .dog-emoji {
      font-size: 6rem;
      animation: bounce 1s ease-in-out infinite alternate;
      filter: drop-shadow(0 8px 16px rgba(255,133,161,0.4));
      display: block;
      margin-bottom: 0.5rem;
    }

    @keyframes bounce {
      from { transform: translateY(0) rotate(-5deg); }
      to   { transform: translateY(-18px) rotate(5deg); }
    }

    .paws-row {
      font-size: 1.6rem;
      letter-spacing: 4px;
      margin-bottom: 1rem;
      animation: wiggle 1.5s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--brown);
      line-height: 1.3;
      margin-bottom: 0.8rem;
      text-shadow: 3px 3px 0 var(--pink-light);
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--brown-light);
      font-weight: 700;
      margin-bottom: 2.5rem;
      letter-spacing: 0.5px;
    }

    /* Card */
    .card {
      background: white;
      border-radius: 32px;
      padding: 2.5rem 2rem;
      box-shadow: 0 12px 40px rgba(255,133,161,0.25), 0 2px 8px rgba(0,0,0,0.05);
      max-width: 480px;
      width: 100%;
      border: 3px solid var(--pink-light);
      position: relative;
    }

    .card::before {
      /* content: '🐾'; */
      position: absolute;
      top: -18px; left: 24px;
      font-size: 2rem;
      background: white;
      padding: 0 4px;
    }

    .question {
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      font-weight: 800;
      color: var(--brown);
      margin-bottom: 2rem;
      line-height: 1.4;
    }

    .question span {
      color: var(--pink);
      font-family: 'Pacifico', cursive;
      display: block;
      margin-top: 5px;
      font-size: 1.2em;
    }

    /* --- 按鈕修改處 --- */
    .btn-group {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      align-items: center;
    }

    .btn {
      flex: 1; /* 讓兩個按鈕等寬 */
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }

    .btn-yes {
      background: linear-gradient(135deg, var(--pink) 0%, #ff5b7f 100%);
      color: white;
      font-size: 1.2rem;
      padding: 1rem 0; /* 統一內距 */
      box-shadow: 0 6px 20px rgba(255,91,127,0.45);
      position: relative;
      overflow: hidden;
    }

    .btn-no {
      background: #f0f0f0;
      color: #aaa;
      font-size: 1rem;
      padding: 1rem 0; /* 統一內距，與 YES 一樣高 */
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      position: relative; /* 初始改為 relative，確保在框框內 */
      z-index: 999;
    }
    /* ---------------- */

    .btn-yes::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-yes:hover::after { opacity: 1; }
    .btn-yes:hover { transform: scale(1.08) translateY(-3px); box-shadow: 0 10px 28px rgba(255,91,127,0.5); }
    .btn-yes:active { transform: scale(0.97); }
    .btn-no:hover { background: #e8e8e8; }

    .hearts {
      margin-top: 1.5rem;
      font-size: 1.3rem;
      letter-spacing: 6px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.92); }
    }

    /* ===== PAGE 2 ===== */
    #page2 {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: linear-gradient(160deg, #fff0f8 0%, #fff8f0 50%, #f0f8ff 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }

    #page2.show {
      display: flex;
      animation: fadeInPage 0.6s ease;
    }

    @keyframes fadeInPage {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .congrats-title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: var(--brown);
      text-shadow: 3px 3px 0 var(--pink-light);
      margin-bottom: 0.4rem;
      z-index: 2;
    }

    .congrats-sub {
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 700;
      color: var(--brown-light);
      margin-bottom: 1.8rem;
      z-index: 2;
    }

    .photo-frame {
      width: min(280px, 75vw);
      height: min(280px, 75vw);
      border-radius: 50%;
      border: 6px solid var(--pink);
      box-shadow: 0 0 0 8px var(--pink-light), 0 12px 40px rgba(255,133,161,0.35);
      overflow: hidden; /* 確保超出圓圈的部分會被裁掉 */
      margin-bottom: 1.6rem;
      z-index: 2;
      background: white; /* 底色 */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0; /* 這裡一定要改成 0，照片才會貼滿邊框 */
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 這行非常重要，它會讓照片填滿而不變形 */
      display: block;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .photo-frame img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--pink);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 1rem;
    }

    .photo-placeholder .big-emoji { font-size: 3.5rem; }

    .photo-upload-hint {
      font-size: 0.8rem;
      color: #bbb;
      margin-top: -1rem;
      margin-bottom: 1.2rem;
      z-index: 2;
    }

    .badge {
      background: linear-gradient(135deg, var(--pink) 0%, #ff5b7f 100%);
      color: white;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      font-weight: 800;
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      box-shadow: 0 6px 20px rgba(255,91,127,0.4);
      z-index: 2;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.8s both;
      letter-spacing: 0.5px;
    }

    .big-hearts-row {
      font-size: 2rem;
      margin-top: 1rem;
      z-index: 2;
      animation: pulse 1.8s ease-in-out infinite;
    }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }
  </style>
</head>
<body>

<div class="bg-paws" id="bgPaws"></div>

<div id="page1">
  <span class="dog-emoji">🐶</span>
  <div class="paws-row">🐾🐾🐾</div>
  <h1>A Very Important Question!</h1>
  <p class="subtitle">Think carefully, escape is not an option 😤</p>

  <div class="card">
    <p class="question">
      Would you like to let me be<br/>
      <span>Your Little Puppy?</span> 🐾
    </p>

    <div class="btn-group">
      <button class="btn btn-yes" id="btn-yes" onclick="handleYes()">
        🐶 YES!
      </button>
      <button class="btn btn-no" id="btn-no">
        No... 😶
      </button>
    </div>

    <div class="hearts">💕💗💕</div>
  </div>
</div>

<div id="page2">
  <p class="congrats-title">🎉 Congratulations! 🎉</p>
  <p class="congrats-sub">You've just adopted a rare and cute Puppy 🐾</p>

  <div class="photo-frame" id="photoFrame">
  <img src="us.JPG" alt="Our Photo" />
</div>

  <!-- <p class="photo-upload-hint">(Place the photo in the same folder and edit the HTML code)</p> -->

  <div class="badge">🐾 Puppy Successfully Adopted! Limited Edition 🐾</div>
  <div class="big-hearts-row">🩷🧡💛💚💙💜🩷</div>
</div>

<canvas id="confetti-canvas"></canvas>

<script>
  // ===== FLOATING PAWS =====
  const bgPaws = document.getElementById('bgPaws');
  const pawEmojis = ['🐾','🐕','🦴','💕','🌸','✨','🩷'];
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('span');
    s.textContent = pawEmojis[Math.floor(Math.random() * pawEmojis.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (8 + Math.random() * 14) + 's';
    s.style.animationDelay = (Math.random() * 12) + 's';
    s.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    bgPaws.appendChild(s);
  }

  // ===== NO BUTTON RUNNING AWAY =====
  const btnNo = document.getElementById('btn-no');
  let isEscaping = false; // 用來追蹤按鈕是否已開始逃跑
  
  // 移除 initNoBtn 的固定位置設定，讓按鈕初始待在框框內

  btnNo.addEventListener('mouseenter', runAway);
  btnNo.addEventListener('touchstart', (e) => {
    e.preventDefault(); // 避免手機觸發點擊
    runAway();
  }, { passive: false });

  function runAway() {
    // 第一次逃跑時，才將 position 改為 fixed 並賦予當前位置
    if (!isEscaping) {
      const rect = btnNo.getBoundingClientRect();
      btnNo.style.width = rect.width + 'px'; // 鎖定寬度避免跑掉時縮放
      btnNo.style.position = 'fixed';
      btnNo.style.left = rect.left + 'px';
      btnNo.style.top = rect.top + 'px';
      isEscaping = true;
    }

    const margin = 60;
    const bw = btnNo.offsetWidth;
    const bh = btnNo.offsetHeight;
    const maxX = window.innerWidth  - bw - margin;
    const maxY = window.innerHeight - bh - margin;
    const x = Math.random() * (maxX - margin) + margin;
    const y = Math.random() * (maxY - margin) + margin;
    
    btnNo.style.left = x + 'px';
    btnNo.style.top  = y + 'px';
    btnNo.style.transition = 'left 0.25s cubic-bezier(0.34,1.56,0.64,1), top 0.25s cubic-bezier(0.34,1.56,0.64,1)';
  }

  // ===== YES HANDLER =====
  function handleYes() {
    document.getElementById('page1').style.display = 'none';
    const page2 = document.getElementById('page2');
    page2.classList.add('show');
    btnNo.style.display = 'none';
    launchConfetti();
  }

  // ===== CONFETTI =====
  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#ff85a1','#ffc2d1','#ffe066','#a8f0c6','#d4a8ff','#ff5b7f','#ffb347','#87ceeb'];
    const shapes = ['rect','circle','ribbon'];
    const pieces = [];

    for (let i = 0; i < 180; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * canvas.height,
        w: 8 + Math.random() * 10,
        h: 5 + Math.random() * 8,
        color: colors[Math.floor(Math.random() * colors.length)],
        shape: shapes[Math.floor(Math.random() * shapes.length)],
        speed: 2.5 + Math.random() * 4,
        angle: Math.random() * 360,
        spin: (Math.random() - 0.5) * 6,
        sway: (Math.random() - 0.5) * 1.5,
        opacity: 0.85 + Math.random() * 0.15
      });
    }

    let frame;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      for (const p of pieces) {
        if (p.y > canvas.height + 20) continue;
        alive = true;
        p.y     += p.speed;
        p.x     += p.sway;
        p.angle += p.spin;
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
        ctx.rotate(p.angle * Math.PI / 180);
        ctx.fillStyle = p.color;
        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.shape === 'ribbon') {
          ctx.beginPath();
          ctx.moveTo(-p.w / 2, 0);
          ctx.quadraticCurveTo(0, -p.h, p.w / 2, 0);
          ctx.quadraticCurveTo(0,  p.h, -p.w / 2, 0);
          ctx.fill();
        } else {
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        }
        ctx.restore();
      }
      if (alive) frame = requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
    setTimeout(() => {
      cancelAnimationFrame(frame);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }, 5500);
  }
</script>
</body>
</html>
